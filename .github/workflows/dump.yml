name: Dumper V2 (Bypass Header)
on: [workflow_dispatch]

jobs:
  dump_offsets:
    runs-on: windows-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install gdown
        run: pip install gdown requests

      - name: Download from Google Drive
        run: |
          gdown --folder "https://drive.google.com/drive/folders/1Kzwj7u5UV33OXBnFf5fghLXVI_gR2Jao" -O ./game_files
        continue-on-error: true

      - name: Phẫu thuật khôi phục Header (Python Auto-Fix)
        shell: python
        run: |
          import os
          for root, dirs, files in os.walk('./game_files'):
              for file in files:
                  if 'global-metadata.dat' in file:
                      path = os.path.join(root, file)
                      try:
                          with open(path, 'r+b') as f:
                              data = bytearray(f.read())
                              # Ép 4 byte đầu tiên về lại chữ ký chuẩn của Unity
                              data[0:4] = b'\xAF\x1B\xB1\xFA'
                              f.seek(0)
                              f.write(data)
                              print(f"[THÀNH CÔNG] Đã phá lớp ngụy trang Header của file: {path}")
                      except Exception as e:
                          print(f"Lỗi khi sửa file: {e}")

      - name: Download Tool Dumper
        shell: python
        run: |
          import requests
          import zipfile
          import os
          url = "https://github.com/AndnixSH/Il2CppDumper-Binaries/raw/master/Il2CppDumper-v6.7.40.zip"
          r = requests.get(url, stream=True)
          with open("dumper.zip", "wb") as f:
              for chunk in r.iter_content(chunk_size=8192):
                  f.write(chunk)
          with zipfile.ZipFile("dumper.zip", 'r') as zip_ref:
              zip_ref.extractall("./dumper")

      - name: Run Dumper V2
        run: |
          $unity = Get-ChildItem -Path ./game_files -Recurse | Where-Object { $_.Name -match "^(UnityFramework|libil2cpp\.so)$" } | Select-Object -First 1
          $metadata = Get-ChildItem -Path ./game_files -Recurse -Filter "global-metadata.dat" | Select-Object -First 1
          
          if ($null -eq $unity -or $null -eq $metadata) {
              Write-Error "LỖI: Không tìm thấy file UnityFramework hoặc global-metadata.dat!"
              exit 1
          }
          
          New-Item -ItemType Directory -Force -Path ./output
          
          # Chạy tool với file đã được phẫu thuật
          $dumpProcess = Start-Process -FilePath "./dumper/Il2CppDumper.exe" -ArgumentList "`"$($unity.FullName)`" `"$($metadata.FullName)`" ./output" -PassThru -NoNewWindow
          $dumpProcess | Wait-Process -Timeout 120 -ErrorAction SilentlyContinue
          
          if (-not $dumpProcess.HasExited) {
              $dumpProcess | Stop-Process -Force
              Write-Error "LỖI: Tool bị treo! Cấu trúc Unity đã bị Tencent/Garena băm nát hoàn toàn từ bên trong."
          }
        continue-on-error: true

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: Game-Offsets-V2
          path: ./output/
