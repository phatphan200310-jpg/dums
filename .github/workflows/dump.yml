name: Dump Game Offsets
on: [workflow_dispatch]

jobs:
  dump_offsets:
    runs-on: windows-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install gdown
        run: pip install gdown

      - name: Download from Google Drive
        run: |
          gdown --folder "https://drive.google.com/drive/folders/1Kzwj7u5UV33OXBnFf5fghLXVI_gR2Jao" -O ./game_files
        continue-on-error: true

      - name: Download Tool (Direct)
        run: |
          # Dùng link dự phòng v6.7.40 ổn định
          $url = "https://github.com/AndnixSH/Il2CppDumper-Binaries/archive/refs/heads/master.zip"
          Invoke-WebRequest -Uri $url -OutFile dumper_master.zip
          Expand-Archive -Path dumper_master.zip -DestinationPath ./temp_tool
          # Di chuyển file ra ngoài cho đúng cấu trúc
          Move-Item -Path ./temp_tool/Il2CppDumper-Binaries-master/* -Destination ./dumper -Force

      - name: Run Dumper
        run: |
          $unity = Get-ChildItem -Path ./game_files -Recurse | Where-Object { $_.Name -match "UnityFramework|kgvn" } | Select-Object -First 1
          $metadata = Get-ChildItem -Path ./game_files -Recurse -Filter "global-metadata.dat" | Select-Object -First 1
          Write-Host "File Binary: $($unity.FullName)"
          Write-Host "File Metadata: $($metadata.FullName)"
          ./dumper/Il2CppDumper.exe $unity.FullName $metadata.FullName ./output
        continue-on-error: true

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: Game-Offsets
          path: ./output/script.json
