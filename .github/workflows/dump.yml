name: Dump Game Offsets
on: [workflow_dispatch]

jobs:
  dump_offsets:
    runs-on: windows-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install gdown
        run: pip install gdown

      - name: Download from Google Drive
        run: |
          gdown --folder "https://drive.google.com/drive/folders/1Kzwj7u5UV33OXBnFf5fghLXVI_gR2Jao" -O ./game_files
        continue-on-error: true

      - name: Extract Dumper from Drive (OFFLINE MODE)
        run: |
          # Tìm file zip của tool do chính ông quăng vào Drive
          $dumperZip = Get-ChildItem -Path ./game_files -Filter "*Il2CppDumper*.zip" | Select-Object -First 1
          if ($null -eq $dumperZip) {
              Write-Error "LỖI: Không tìm thấy file ZIP của công cụ trong Drive! Vui lòng tải tool trên mạng và quăng vào Drive."
              exit 1
          }
          Write-Host "Đã tìm thấy Tool: $($dumperZip.FullName)"
          Expand-Archive -Path $dumperZip.FullName -DestinationPath ./dumper -Force

      - name: Run Dumper (Auto Detect)
        run: |
          $unity = Get-ChildItem -Path ./game_files -Recurse | Where-Object { $_.Name -match "^(UnityFramework|libil2cpp\.so|GameAssembly\.dll|kgvn)$" } | Select-Object -First 1
          $metadata = Get-ChildItem -Path ./game_files -Recurse -Filter "global-metadata.dat" | Select-Object -First 1
          
          if ($null -eq $unity -or $null -eq $metadata) {
              Write-Error "LỖI: Không tìm thấy file lõi hoặc file metadata!"
              exit 1
          }

          $exePath = Get-ChildItem -Path ./dumper -Recurse -Filter "Il2CppDumper.exe" | Select-Object -First 1
          Write-Host "Chạy file lõi: $($unity.FullName)"
          
          $dumpProcess = Start-Process -FilePath $exePath.FullName -ArgumentList "`"$($unity.FullName)`" `"$($metadata.FullName)`" ./output" -PassThru -NoNewWindow
          $dumpProcess | Wait-Process -Timeout 60 -ErrorAction SilentlyContinue
          
          if (-not $dumpProcess.HasExited) {
              $dumpProcess | Stop-Process -Force
              Write-Error "LỖI: Tool bị treo."
          }
        continue-on-error: true

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: Game-Offsets
          path: ./output/script.json
